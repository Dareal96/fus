<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>buy.fusdcrypto.com</title>
  <link rel="stylesheet" href="./fontawesome-free-7.0.1-web/css/fontawesome.min.css">
   <link rel="stylesheet" href="./fontawesome-free-7.0.1-web/css/brands.min.css">
   <link rel="stylesheet" href="./fontawesome-free-7.0.1-web/css/solid.min.css">
</head>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
  }

  .hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    background-color: #defae9;
    height: 80px;
  }

  .hero p {
    font-size: 20px;
    font-weight: bold;
    color: #333;
  }

  .hero i {
    font-size: 24px;
    color: black;
    cursor: pointer;
  }
  .wallet-connect{
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 50vh;
  
  }
  .Wallet{
    font-size: 24px;
    font-weight: bold;
    color: #333;
  }
  .please{
    font-size: 18px;
    color: #666;
    margin-top: -10px;
    text-align: center;
    margin-bottom: 29px;

  }
  #ConncetBtn{
    margin-top: 20px;
    padding: 17px 25px;
    font-size: 20px;
    color: white;
    font-weight: bold;
    background-color: #0e843bd6;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    margin-top: -5px;
  }
</style>
<body>
  <div class="hero">
    <p>Trading FUSD/FUST</p>
    <i class="fa-solid fa-bars"></i>
  </div>

  <div class="wallet-connect">
    <p class="Wallet">Wallet Not Connected</p>
    <p class="please">Please connect your wallet to use the FUSD Exchange</p>

    <button id="ConncetBtn"> Connect Wallet</button>
  </div>
  
</body>
</html>
